{% extends 'core/base.html' %}


{% block title %}Vendors{% endblock title %}


{% block content %}

    <h1 class="title">Vendors</h1>

    <div class="columns is-multiline">
        {% for vendor in vendors %}
        
            <div class="column is-3">
                <div class="box py-5 px-4 has-text-centered">
                    <h2 class="title is-4 mb-4" style="color: var(--primary-color);">
                        {{ vendor.name }}
                    </h2>
                    <div class="mt-auto">
                        <hr class="my-4" style="background-color: rgba(0,0,0,0.05);">
                        <a href="{% url 'vendor:vendor' vendor.id %}" class="button is-primary is-fullwidth">View Products</a>
                    </div>
                </div>
            </div>

        {% endfor %}
    </div>

{% endblock content %}
