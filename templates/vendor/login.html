{% extends 'core/base.html' %}

{% block title %}Vendor Login{% endblock title %}

{% block content %}

    <h1 class="title">Vendor Login</h1>

    <form method="post" action="">
        {% csrf_token %}

        {{ form.as_p }}

        {% if request.GET.next %}
            <input type="hidden" name="next" value="{{ request.GET.next }}">
        {% endif %}

        <div class="field">
            <div class="control">
                <button type="submit" class="button is-dark is-uppercase">Log In</button>
            </div>
        </div>
    </form>
{% endblock content %}
