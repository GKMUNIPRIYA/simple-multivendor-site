<div class="column is-3 product-list-item animate-fade-up delay-{{ forloop.counter|default:1 }}">
    <div class="box">
        <figure class="image is-4by3">
            <img src="{{ product.get_thumbnail }}" alt="{{product.title}}">
        </figure>

        <div class="content-wrapper">
            <h2 class="title">{{product.title}}</h2>
            <h3 class="price">${{product.price}}</h3>
            <hr>
            <a href="{% url 'product:product' product.category.slug product.slug %}" class="button is-dark is-fullwidth">View Details</a>
        </div>
    </div>
            </div>
